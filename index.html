<!DOCTYPE html>
<html>
  <head>
    <title>christmas forest</title>
    <meta name="description" content="lookout for santa" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="treeGeneration.js"></script> <!-- Link to tree generation script -->
    <script src="snowGeneration.js"></script> <!-- Link to snow generation script -->
    <script src="audio-unlock.js"></script>
    <script src="popup.js"></script> <!-- Link to popup script -->
    <script src="movement.js"></script> <!-- link to Movement script -->
    <script src="santamove.js"></script> <!-- link to Santa movement animation -->
    <script src="joystick.js"></script> <!-- link to joystick in moblile only -->
  </head>
  <body>
    <a-scene fog="type: linear; color: #FFFFFF; near: 1; far: 20">
      <audio id="ambient-sound" src="christmas.mp3" preload="auto"></audio>
      
      <a-assets>
        <a-asset-item
          id="treemodel"
          src="Ctree.glb"
        ></a-asset-item>
        
        <a-asset-item
          id="snowmodel"
          src="snow_pile.glb"
        ></a-asset-item>
        
        <a-asset-item
          id="santa"
          src="santa.glb"
        ></a-asset-item>
        
      </a-assets>
      
      <a-sky color="#ECECEC"></a-sky>

      <!-- Snowy ground plane -->
      <a-plane 
        position="0 0 -10" 
        rotation="-90 0 0" 
        width="100" 
        height="100" 
        color="#FFFFFF" 
        material="opacity: 0.9; roughness: 1"
      ></a-plane>

      <!-- Moving fog with white color -->
      <a-box 
        id="movingFog"
        position="0 1 -5" 
        depth="20" 
        height="5" 
        width="20" 
        color="#FFFFFF" 
        opacity="0.1"
        animation="property: position; from: -10 1 -5; to: 10 1 -5; loop: true; dur: 20000; easing: linear;"
      ></a-box>

      <!-- Camera rig with controllers as children -->
      <a-entity id="camera-rig" player-jump>
        <a-camera id="camera" position="0 1.6 0" look-controls="pointerLockEnabled: true">
          <a-cursor id="desktop-cursor" rayOrigin="mouse" raycaster="objects: .interactive" visible="false" desktop-cursor-only></a-cursor>
        </a-camera>

        <!-- Left controller -->
        <a-entity
          id="left-controller"
          laser-controls="hand: left"
          raycaster="objects: .interactive; far: 10"
          line="color: #00ff00; opacity: 0.8; lineWidth: 2;"
           cursor="rayOrigin: entity"
          thumbstick-audio
          smooth-locomotion
        ></a-entity>

        <!-- Right controller -->
        <a-entity
          id="right-controller"
          laser-controls="hand: right"
          raycaster="objects: .interactive; far: 10"
          line="color: #00ff00; opacity: 0.8; lineWidth: 2;"
          cursor="rayOrigin: entity"
          vr-smooth-turn
          thumbstick-audio
        ></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
